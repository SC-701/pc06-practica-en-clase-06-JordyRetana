name: Deploy Vehiculo API to Azure (Windows)

env:
  AZURE_WEBAPP_NAME: apijordy
  DOTNET_VERSION: '8.0'

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'Vehiculo.API/BD/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest   

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Solution
        run: dotnet restore Vehiculo.API.sln

      - name: Build Solution
        run: dotnet build Vehiculo.API.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test Vehiculo.API.sln --configuration Release --no-build || echo "No tests found"

      - name: Publish API
        run: dotnet publish Vehiculo.API/API/API.csproj -c Release -o publish --no-build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
